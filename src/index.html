<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    (function(l){
      if(l.search[1] === '/'){
        var decoded = l.search.slice(1).split('&').map(function(s){
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
  <title>Army Battlefield Monitoring System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Real-time Army Battlefield Monitoring System — tactical map, troop database, command center">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
